<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden | ShineWerk</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="page">
  
  <header class="site-header">
    <div class="container">
      <div class="nav-wrapper">
        <a href="/" class="logo">
          <img src="/img/logo.png" alt="ShineWerk Logo" class="logo-img">
          <div class="logo-text">
            <span class="logo-main">ShineWerk</span>
            <span class="logo-sub">Lackveredelung & Versiegelung</span>
          </div>
        </a>
        <nav class="nav-links" id="nav-links">
          <a href="/">Home</a>
          <a href="/signature-services">Signature Services</a>
          <a href="https://wa.me/4915562648989" class="btn btn-primary" target="_blank" rel="noopener">
            WhatsApp Kontakt
          </a>
        </nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menü umschalten">
          <span class="burger-line"></span>
          <span class="burger-line"></span>
          <span class="burger-line"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="error-main">
    <div class="container error-container">
      <div class="glass-card error-card">
        <div class="error-code">404</div>
        <h1 class="error-title">Diese Seite existiert nicht.</h1>
        <p class="error-desc">Der Link ist entweder veraltet, fehlerhaft oder die Seite wurde verschoben.</p>
        <a href="/" class="btn btn-primary">
          Zurück zur Startseite
        </a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year"></span> ShineWerk. Alle Rechte vorbehalten.</div>
      <nav class="footer-nav">
        <a href="/rechtliches/impressum.html">Impressum</a>
        <a href="/rechtliches/datenschutz.html">Datenschutz</a>
        <a href="/rechtliches/agb.html">AGB</a>
      </nav>
    </div>
  </footer>
</div>

<style>
  .error-main {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 160px 0 80px;
    background-color: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .error-main::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("/img/hero.png");
    background-size: cover;
    background-position: center;
    opacity: 0.15;
    filter: blur(8px);
    z-index: 0;
  }
  .error-container {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
  }
  .error-card {
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    padding: 60px 40px;
    text-align: center;
    max-width: 600px;
    width: 100%;
  }
  .error-code {
    font-family: "Playfair Display", serif;
    font-size: 80px;
    line-height: 1;
    color: var(--accent-blue);
    opacity: 0.15;
    font-weight: 700;
    margin-bottom: -20px;
  }
  .error-title {
    font-family: "Playfair Display", serif;
    font-size: 32px;
    color: var(--text-main);
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }
  .error-desc {
    font-size: 16px;
    color: var(--text-soft);
    margin-bottom: 32px;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const yearEl = document.getElementById("year");
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    const header = document.querySelector(".site-header");
    const toggle = document.getElementById("nav-toggle");
    if (toggle && header) {
      toggle.addEventListener("click", () => {
        header.classList.toggle("is-open");
        document.body.style.overflow = header.classList.contains("is-open") ? "hidden" : "";
      });
      
      const navLinks = document.querySelectorAll(".nav-links a");
      navLinks.forEach(link => {
        link.addEventListener("click", () => {
          header.classList.remove("is-open");
          document.body.style.overflow = "";
        });
      });
    }
  });
</script>
</body>
</html>
